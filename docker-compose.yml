version: "3.3"

services:
  db:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=nodejs-shop
    volumes:
      - data:/var/lib/mysql
  mongodb:
    image: mongo
    ports:
      - "27019:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=node-shopping
    networks:
      - mongo-network
  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_BASICAUTH_USERNAME=mongo
      - ME_CONFIG_BASICAUTH_PASSWORD=password
      - ME_CONFIG_MONGODB_PORT=27019
      - ME_CONFIG_MONGODB_ADMINUSERNAME=root
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_URL=mongodb://root:password@localhost:27019/test?authSource=admin&readPreference=primary&appname=MongoDB%20Compass%20Community&ssl=false
    links:
      - mongodb
    networks:
      - mongo-network
volumes:
  data:

networks:
  mongo-network:
    driver: bridge
